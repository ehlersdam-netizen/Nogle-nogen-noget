<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nogen, nogle eller noget</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <h1>Nogen, nogle eller noget</h1>
      <p>Vælg det rigtige ord. Du får 10 tilfældige sætninger i hver runde.</p>
    </header>

    <main class="card quiz-card">
      <div class="topbar">
        <div id="progressInfo">1/10 sætninger</div>
      </div>

      <div class="progress-track">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <section class="sentence-box">
        <div id="sentenceText" class="sentence-text">Sætningen vises her.</div>
      </section>

      <section id="choices" class="choices">
        <button class="choice-btn" data-choice="nogen" type="button">nogen</button>
        <button class="choice-btn" data-choice="nogle" type="button">nogle</button>
        <button class="choice-btn" data-choice="noget" type="button">noget</button>
      </section>

      <section id="feedbackArea" class="feedback-area" aria-live="polite">
        <div id="feedbackMessage" class="feedback-message"></div>
        <div id="correctAnswer" class="correct-answer"></div>
        <div id="explanation" class="explanation"></div>
      </section>

      <div class="actions">
        <button id="nextBtn" class="next-btn" type="button" disabled>Næste</button>
        <button id="newRoundBtn" class="new-round-btn hidden" type="button">Ny runde</button>
      </div>

      <section id="roundSummary" class="round-summary hidden">
        <h2>Runden er slut</h2>
        <p id="scoreText"></p>
        <p id="roundsLeftText"></p>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
